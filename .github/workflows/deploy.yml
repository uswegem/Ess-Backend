name: Deploy ESS2 Backend
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - uat
          - prod
jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set deploy variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "deploy_path=/opt/ess2/backend" >> $GITHUB_OUTPUT
            echo "pm2_app=ess2-backend-prod" >> $GITHUB_OUTPUT
            echo "port=4000" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=/home/uswege/ess2/backend" >> $GITHUB_OUTPUT
            echo "pm2_app=ess2-backend-uat" >> $GITHUB_OUTPUT
            echo "port=4002" >> $GITHUB_OUTPUT
          fi

      - name: Copy app to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_HOST_PROD || secrets.ESS_HOST_UAT }}
          username: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_USER_PROD || secrets.ESS_USER_UAT }}
          key: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_SSH_KEY_PROD || secrets.ESS_SSH_KEY_UAT }}
          source: "server.js,package.json,package-lock.json,ecosystem.config.js,src/,keys/"
          target: ${{ steps.vars.outputs.deploy_path }}

      - name: Install & restart on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_HOST_PROD || secrets.ESS_HOST_UAT }}
          username: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_USER_PROD || secrets.ESS_USER_UAT }}
          key: ${{ github.event.inputs.environment == 'prod' && secrets.ESS_SSH_KEY_PROD || secrets.ESS_SSH_KEY_UAT }}
          script: |
            cd ${{ steps.vars.outputs.deploy_path }}
            npm install
            npm prune --omit=dev
            pm2 restart ${{ steps.vars.outputs.pm2_app }} --update-env \
              || PORT=${{ steps.vars.outputs.port }} pm2 start server.js \
                  --name ${{ steps.vars.outputs.pm2_app }}
            pm2 save

      - name: Confirm deployment
        run: echo "✅ ESS2 Backend deployed to ${{ github.event.inputs.environment }} on port ${{ steps.vars.outputs.port }}"
